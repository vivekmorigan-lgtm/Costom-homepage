<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Comet Clock + To-Do</title>
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-regular-straight/css/uicons-regular-straight.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        font-family: Arial, sans-serif;
        color: #39ff14;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* Clock */
      .clock-container {
        position: relative;
        width: 250px;
        height: 250px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #39ff14;
        font-weight: bold;
        font-size: 2.5em;
        flex-direction: column;
        z-index: 1;
      }
      .hours-minutes {
        text-align: center;
        z-index: 5;
      }
      .dot {
        position: absolute;
        width: 12px;
        height: 12px;
        background-color: #45cc2d;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        margin: -6px 0 0 -6px;
        box-shadow: 0 0 10px #45cc2d, 0 0 20px #45cc2d, 0 0 30px #45cc2d;
      }
      .trail {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        margin: -4px 0 0 -4px;
        opacity: 0.7;
        filter: blur(4px);
      }

      /* Panels */
      .panel {
        position: fixed;
        top: 50px;
        width: 250px;
        background: #1a1a1a;
        border-radius: 15px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: all 0.3s ease;
        z-index: 10;
        opacity: 0;
      }
      .panel.show {
        opacity: 1;
      }
      .panel h2 {
        margin: 0;
        font-size: 1.3em;
        color: #00ff7f;
        text-align: center;
      }
      .panel input[type="text"] {
        padding: 8px;
        border-radius: 6px;
        border: none;
        width: 100%;
        font-size: 0.95em;
        outline: none;
        background: #222;
        color: #fff;
      }
      .panel button {
        padding: 6px 8px;
        border: none;
        border-radius: 6px;
        background: #39ff14;
        font-weight: bold;
        cursor: pointer;
        color: #000;
        transition: 0.3s;
        margin-left: 4px;
      }
      .panel button:hover {
        background: #33e512;
      }

      #date {
        position: fixed;
        bottom: 0px;
        right: 0px;
        padding: 0;
        margin: 0;
        font-size: 20px;
      }

      .list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 300px;
        overflow-y: auto;
      }
      .list li {
        background: #222;
        padding: 8px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #fff;
        flex-wrap: wrap;
      }
      .list li.completed {
        text-decoration: line-through;
        color: #777;
      }
      .list li div {
        display: flex;
        gap: 4px;
      }

      /* Toggle Buttons */
      .todo-toggle {
        position: fixed;
        top: 50px;
        width: 30px;
        height: 60px;
        background: #33e512;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #000;
        font-weight: bold;
        z-index: 15;
        right: 0;
        border-radius: 15px 0 0 15px;
      }
      .todo-panel {
        right: -250px;
      }
      .todo-panel.show {
        right: 55px;
      }

      #search {
        background: rgba(0, 0, 0, 0.5);
        width: 40%;
        height: 25px;
        color: #39ff14;
        position: fixed;
        top: 100px;
        right: 28%;
        border: 0.5px solid;
        padding: 5px 10px;
        border-radius: 30px;
        transition: transform 1s ease, border-color 5s ease;
        animation: spin 5s ease-in-out infinite;
      }
      #search::placeholder {
        color: #ffffff;
        opacity: 0.7;
      }
      #search:hover {
        border-color: #888;
        transform: translateY(-5px);
      }

      #search:focus {
        outline: none;
        border-color: #39ff14;
        background-color: #111;
      }

      @keyframes spin {
        0% {
          border-color: #111;
        }
        50% {
          border-color: #39ff14;
        }
        100% {
          border-color: #111;
        }
      }

      .floating-box {
        position: fixed;
        bottom: 50px;
        left: 40px;
        width: 23px;
        padding: 15px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #39ff14;
        backdrop-filter: blur(70px);
        color: #fff;
        animation: floatMove 5s infinite alternate ease-in-out;
        display: grid;
        place-items: center;
      }
      @keyframes floatMove {
        0% {
          border-color: #111;
          transform: translateY(20px);
        }
        50% {
          border-color: #39ff14;
          transform: translateY(30px);
        }
        100% {
          border-color: #111;
          transform: translateY(20px);
        }
      }
      .floating-box a {
        color: #555;
        text-decoration: none;
        display: block;
        margin: 8px 0;
      }
      a i {
        font-size: 25px;
        color: #39ff14;
      }

      /* ---- Timer UI ---- */
      /* start button (to left of the circle) */
      #startTimer {
        position: fixed;
        height: 50px;
        width: 50px;
        bottom: 42px;
        right: 60px;
        color: #111;
        border: 1px solid #111;
        padding: 2px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        z-index: 200;
        background: #33e512;
      }
      #startTimer:hover {
        background: #111;
        color: #33e512;
        border: 1px solid #33e512;
      }

      /* circular timer */
      #timerCircle {
        position: fixed;
        bottom: 100px;
        right: 35px;
        width: 96px;
        height: 96px;
        border-radius: 35px;
        border: 1px solid #39ff14;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #39ff14;
        font-size: 14px;
        font-weight: bold;
        z-index: 200;
        background: rgba(0, 0, 0, 0.5);
        visibility: hidden; /* hidden until timer starts */
        opacity: 0;
        transition: opacity 0.2s, visibility 0.2s;
      }

      /* visible state */
      #timerCircle.show {
        visibility: visible;
        opacity: 1;
      }

      #timerText {
        z-index: 2;
        pointer-events: none;
      }

      #timerDot {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #45cc2d;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        margin: -5px 0 0 -5px;
        box-shadow: 0 0 10px #45cc2d, 0 0 20px #45cc2d;
        transform: translate(0, -38px);
        transition: transform 0.2s linear;
      }
      .quotecontainer {
        position: fixed;
        top: 40px;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #39ff14;
        font-size: 18px;
        font-weight: bold;
        padding: 8px;
      }
      /* --- Search Buttons --- */
      .search-buttons {
        position: fixed;
        top: 65px; /* just above search bar */
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 20;
      }
      .engine-btn {
        padding: 5px 10px;
        border-radius: 20px;
        border: 1px solid #39ff14;
        background: #111;
        color: #39ff14;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s, color 0.3s;
      }
      .engine-btn:hover {
        background: #39ff14;
        color: #111;
      }
      .engine-btn.active {
        background: #39ff14;
        color: #111;
      }
    </style>
  </head>
  <body>
    <!-- Clock -->
    <div class="clock-container">
      <div class="hours-minutes" id="time">00:00</div>
      <h6 id="date"></h6>
      <div id="dot1" class="dot"></div>
      <div id="trailContainer"></div>
    </div>

    <!-- To-Do Widget -->
    <div class="panel todo-panel" id="todoWidget">
      <h2>To-Do</h2>
      <input type="text" id="taskInput" placeholder="Add a task" />
      <button onclick="addTask()">Add Task</button>
      <ul class="list" id="taskList"></ul>
    </div>
    <div class="todo-toggle" id="todoToggle">☰</div>

    <!-- 🔹 Search Engine Selector -->
    <div class="search-buttons">
      <button
        class="engine-btn active"
        data-url="https://www.google.com/search?q="
      >
        Google
      </button>
      <button
        class="engine-btn"
        data-url="https://www.youtube.com/results?search_query="
      >
        YouTube
      </button>
      <button
        class="engine-btn"
        data-url="https://chrome.google.com/webstore/search/"
      >
        Chrome Webstore
      </button>
    </div>

    <!-- search bar -->
    <form id="searchForm">
      <input
        type="search"
        name="q"
        placeholder="Search"
        id="search"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
    </form>

    <div class="floating-box">
      <a href="https://www.pinterest.com"
        ><i class="fi fi-brands-pinterest"></i
      ></a>
      <a href="https://www.youtube.com"><i class="fi fi-brands-youtube"></i></a>
      <a href="https://www.dropbox.com"><i class="fi fi-brands-dropbox"></i></a>
      <a href="https://www.instagram.com"
        ><i class="fi fi-brands-instagram"></i
      ></a>
      <a href="https://www.gmail.com"><i class="fi fi-rr-envelope"></i></a>
    </div>

    <button id="startTimer" title="Start timer">
      <i class="fi fi-rr-play"></i>
    </button>

    <div id="timerCircle" aria-hidden="true">
      <div id="timerText">00:00</div>
      <div id="timerDot"></div>
    </div>

    <div class="quotecontainer">
      <h4 id="quoteText"></h4>
    </div>

    <script>
      /* ----------- Clock Script ----------- */
      const dotCount = 10;
      const radius = 115;
      const trailDots = [];
      const container = document.getElementById("trailContainer");
      for (let i = 0; i < dotCount; i++) {
        const td = document.createElement("div");
        td.className = "trail";
        td.style.backgroundColor = "#45CC2D";
        td.style.opacity = ((0.7 * (dotCount - i)) / dotCount).toString();
        container.appendChild(td);
        trailDots.push(td);
      }
      function updateDate() {
        const now = new Date();
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        document.getElementById("date").textContent = now.toLocaleDateString(
          undefined,
          options
        );
      }
      function updateClock() {
        const now = new Date();
        let hours = now.getHours() % 12;
        hours = hours ? hours : 12;
        hours = String(hours).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
        document.getElementById("time").textContent = `${hours}:${minutes}`;
        updateDate();
        const deg = (seconds / 60) * 360;
        const rad = (deg * Math.PI) / 180;
        const dot1 = document.getElementById("dot1");
        dot1.style.transform = `translate(${radius * Math.sin(rad)}px, ${
          -radius * Math.cos(rad)
        }px)`;
        for (let i = 0; i < dotCount; i++) {
          const offset = i * 0.03;
          const radTrail = rad - offset * Math.PI * 2;
          trailDots[i].style.transform = `translate(${
            radius * Math.sin(radTrail)
          }px, ${-radius * Math.cos(radTrail)}px)`;
        }
        requestAnimationFrame(updateClock);
      }
      updateClock();

      /* ----------- To-Do Script ----------- */
      const taskInput = document.getElementById("taskInput");
      const taskList = document.getElementById("taskList");
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
      function addTask() {
        const taskText = taskInput.value.trim();
        if (!taskText) return;
        tasks.push({ text: taskText, completed: false });
        taskInput.value = "";
        saveTasks();
        renderTasks();
      }
      function deleteTask(index) {
        tasks.splice(index, 1);
        saveTasks();
        renderTasks();
      }
      function toggleComplete(index) {
        tasks[index].completed = !tasks[index].completed;
        saveTasks();
        renderTasks();
      }
      function saveTasks() {
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }
      function renderTasks() {
        taskList.innerHTML = "";
        tasks.forEach((task, index) => {
          const li = document.createElement("li");
          li.className = task.completed ? "completed" : "";
          li.innerHTML = `
            <span onclick="toggleComplete(${index})">${task.text}</span>
            <button onclick="deleteTask(${index})">✖</button>
          `;
          taskList.appendChild(li);
        });
      }
      renderTasks();

      /* ----------- Toggle Panels ----------- */
      const todoWidget = document.getElementById("todoWidget");
      const todoToggle = document.getElementById("todoToggle");
      todoToggle.addEventListener("click", () => {
        todoWidget.classList.toggle("show");
      });

      /* -------- Placeholder typing effect -------- */
      const input = document.getElementById("search");
      const words = [
        "Search something...",
        "Find mystery...",
        "Explore the earth...",
        "Discover new creatures...",
        "Look up for something...",
        "Browse documentaries...",
        "Seek knowledge...",
        "Investigate mysteries...",
        "Research topics...",
        "Inquire about...",
        "Surf the web...",
        "Navigate through...",
      ];
      let wordIndex = 0;
      let charIndex = 0;
      let typing = true;

      function typeEffect() {
        const currentWord = words[wordIndex];
        if (typing) {
          input.placeholder = currentWord.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentWord.length) {
            typing = false;
            setTimeout(typeEffect, 1500);
            return;
          }
        } else {
          input.placeholder = currentWord.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
            typing = true;
            wordIndex = (wordIndex + 1) % words.length;
          }
        }
        setTimeout(typeEffect, typing ? 100 : 50);
      }
      typeEffect();
      /* -------- Quotes typing effect (random) -------- */
      const quoteText = document.getElementById("quoteText");
      const quotes = [
        "Believe you can and you're halfway there.",
        "Your limitation—it's only your imagination.",
        "Push yourself, because no one else is going to do it for you.",
        "Great things never come from comfort zones.",
        "Dream it. Wish it. Do it.",
        "Success doesn't just find you. You have to go out and get it.",
        "Don't watch the clock; do what it does. Keep going.",
        "Little things make big days.",
        "It's going to be hard, but hard does not mean impossible.",
        "Don't wait for opportunity. Create it.",
        "Dream bigger. Do bigger.",
        "Don't stop when you're tired. Stop when you're done.",
      ];

      let qIndex = Math.floor(Math.random() * quotes.length); // start random
      let qCharIndex = 0;
      let qTyping = true;

      function typeQuotes() {
        const current = quotes[qIndex];
        if (qTyping) {
          quoteText.textContent = current.substring(0, qCharIndex + 1);
          qCharIndex++;
          if (qCharIndex === current.length) {
            qTyping = false;
            setTimeout(typeQuotes, 1500);
            return;
          }
        } else {
          quoteText.textContent = current.substring(0, qCharIndex - 1);
          qCharIndex--;
          if (qCharIndex === 0) {
            qTyping = true;
            // pick a different random index (avoid same quote twice)
            let newIndex;
            do {
              newIndex = Math.floor(Math.random() * quotes.length);
            } while (newIndex === qIndex && quotes.length > 1);
            qIndex = newIndex;
          }
        }
        setTimeout(typeQuotes, qTyping ? 100 : 50);
      }
      typeQuotes();

      /* ----------- Random Online Background Script ----------- */
      function applyRandomOnlineBackground() {
        const url = `https://picsum.photos/1920/1080?random=${Date.now()}`;
        document.body.style.backgroundImage = `url("${url}")`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
        document.body.style.backgroundRepeat = "no-repeat";
      }
      setInterval(applyRandomOnlineBackground, 15000);
      applyRandomOnlineBackground();

      /* ----------- Circular Countdown Timer (added) ----------- */
      /* Features:
         - Prompt accepts: SS | MM:SS | HH:MM:SS | 1h30m | 45m | 30s
         - Shows time inside neon circular ring (above the date)
         - Small blue dot circles the ring as the countdown progresses
      */

      const startBtn = document.getElementById("startTimer");
      const timerCircle = document.getElementById("timerCircle");
      const timerText = document.getElementById("timerText");
      const timerDot = document.getElementById("timerDot");

      let timerInterval = null;
      let timerTotal = 0; // seconds
      let timerRemaining = 0; // seconds

      function parseTimeInput(str) {
        if (!str) return NaN;
        str = String(str).trim().toLowerCase();
        // hh:mm:ss or mm:ss or ss
        if (str.includes(":")) {
          const parts = str.split(":").map((p) => parseInt(p, 10));
          if (parts.some(isNaN)) return NaN;
          if (parts.length === 3) {
            return parts[0] * 3600 + parts[1] * 60 + parts[2];
          } else if (parts.length === 2) {
            return parts[0] * 60 + parts[1];
          } else if (parts.length === 1) {
            return parts[0];
          }
        }
        // patterns like 1h30m20s or 45m or 30s
        const regex = /(?:(\d+)\s*h)?\s*(?:(\d+)\s*m)?\s*(?:(\d+)\s*s)?/;
        const m = str.match(regex);
        if (m && (m[1] || m[2] || m[3])) {
          const h = parseInt(m[1] || 0, 10);
          const mm = parseInt(m[2] || 0, 10);
          const s = parseInt(m[3] || 0, 10);
          return h * 3600 + mm * 60 + s;
        }
        // plain number -> treat as seconds
        if (!isNaN(Number(str))) {
          return Math.max(0, Math.floor(Number(str)));
        }
        return NaN;
      }

      function formatTime(sec) {
        sec = Math.max(0, Math.floor(sec));
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        if (h > 0)
          return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(
            2,
            "0"
          )}`;
        return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function updateTimerUI() {
        // show remaining time inside circle
        timerText.textContent = formatTime(timerRemaining);

        // rotate dot proportional to progress (0 -> start, 1 -> finished)
        const progress = timerTotal > 0 ? 1 - timerRemaining / timerTotal : 0;
        const angleDeg = progress * 360; // rotate clockwise
        const angleRad = (angleDeg * Math.PI) / 180;
        // radius path for dot (slightly inside circle)
        const pathRadius = timerCircle.clientWidth / 2 - 14; // px
        const dx = Math.sin(angleRad) * pathRadius;
        const dy = -Math.cos(angleRad) * pathRadius;
        timerDot.style.transform = `translate(${dx}px, ${dy}px)`;
      }

      function startCircularTimer(seconds) {
        clearInterval(timerInterval);
        if (!Number.isFinite(seconds) || seconds <= 0) return;
        timerTotal = Math.floor(seconds);
        timerRemaining = timerTotal;

        // show UI
        timerCircle.classList.add("show");
        timerCircle.setAttribute("aria-hidden", "false");
        updateTimerUI();

        // tick every second
        timerInterval = setInterval(() => {
          timerRemaining--;
          if (timerRemaining < 0) {
            clearInterval(timerInterval);
            timerRemaining = 0;
            updateTimerUI();
            // final state: keep 00:00 visible briefly and then hide after 3s
            setTimeout(() => {
              timerCircle.classList.remove("show");
              timerCircle.setAttribute("aria-hidden", "true");
            }, 3000);
            return;
          }
          updateTimerUI();
        }, 1000);
      }

      // start button click -> prompt for time
      startBtn.addEventListener("click", () => {
        const timeInput = prompt("Enter time");
        const secs = parseTimeInput(timeInput);
        if (!Number.isFinite(secs) || secs <= 0) {
          alert("Invalid time format or zero. Try: 90  OR  02:30");
          return;
        }
        startCircularTimer(secs);
      });

      // Save the original function
      const originalStart = startCircularTimer;

      // Override it
      startCircularTimer = function (seconds) {
        originalStart(seconds); // call the normal timer

        // Watch the timer until it ends
        const checkInterval = setInterval(() => {
          if (typeof timerRemaining !== "undefined" && timerRemaining <= 0) {
            const audio = new Audio(
              "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
            );
            audio.play();
            clearInterval(checkInterval); // stop checking
          }
        }, 200);
      };

      /* --- Search Engine Buttons Script --- */
      const engineButtons = document.querySelectorAll(".engine-btn");
      let currentEngine = engineButtons[0].dataset.url; // default Google

      engineButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          engineButtons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentEngine = btn.dataset.url;
        });
      });

      // override form submit to use chosen engine
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("search");

      searchForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const query = encodeURIComponent(searchInput.value.trim());
        if (!query) return;
        window.location.href = currentEngine + query;
      });
    </script>
  </body>
</html>
